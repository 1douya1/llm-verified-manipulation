# Demo Planning Scene - collision primitives for plan-only demo
# No perception or hardware required.
#
# Coordinate frame: base_link (robot base)
# All dimensions in metres.

objects:
  # Workspace table surface
  - id: table
    type: box
    dimensions: [0.6, 0.8, 0.02]        # x, y, z extents
    position:   [0.0, -0.40, 0.01]       # centre of the box
    orientation: [0.0, 0.0, 0.0, 1.0]    # qx, qy, qz, qw
    color:      [0.55, 0.35, 0.18, 0.8]  # RGBA (wood brown)

  # Source container (cup) - MTC "object" target for pick
  - id: object
    type: cylinder
    dimensions: [0.035, 0.10]            # radius, height
    position:   [0.0, -0.40, 0.07]
    orientation: [0.0, 0.0, 0.0, 1.0]
    color:      [0.2, 0.6, 0.9, 1.0]    # blue

  # Target container (bowl) - pour destination
  - id: bowl
    type: cylinder
    dimensions: [0.05, 0.06]             # radius, height
    position:   [0.15, -0.45, 0.05]
    orientation: [0.0, 0.0, 0.0, 1.0]
    color:      [0.9, 0.3, 0.3, 1.0]    # red
