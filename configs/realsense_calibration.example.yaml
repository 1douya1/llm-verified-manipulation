# ============================================================
# RealSense D435i intrinsics (ROS camera_info layout)
# ============================================================
#
# IMPORTANT: These intrinsics are SAMPLE VALUES from the author's D435i and
# are kept here only so the pipeline can be end-to-end tested without a
# camera. You MUST re-calibrate and verify your own camera intrinsics
# BEFORE any hand-eye calibration or real-robot run.
#
# How to regenerate for your camera:
#   1. Start the camera:
#        ros2 launch realsense2_camera rs_launch.py align_depth.enable:=true
#   2. Use the standard ROS 2 camera_calibration tool with a checkerboard:
#        ros2 run camera_calibration cameracalibrator \
#          --size 7x5 --square 0.025 \
#          image:=/camera/camera/color/image_raw \
#          camera:=/camera/camera/color
#   3. Copy the output YAML into your own configs/ file (do NOT commit it).
#
# DO NOT commit a replacement file with your real data -- this example is
# the only YAML of this kind that lives in the repo. See `.gitignore`.
# ============================================================
